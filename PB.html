<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Portfolio Builder</title>
  <style>
    body { 
    font-family: Arial, sans-serif; 
    padding: 20px; 
    background:#f5f5f5; 
  }

    .container { 
    max-width:800px; 
    margin:auto; 
    background:white; 
    padding:20px; 
    border-radius:10px; 
    box-shadow:0 0 10px rgba(0,0,0,0.1); 
    }

    h2 { 
    margin-top:0; 
    }

    label { 
      font-weight:bold; 
      display:block; 
      margin-top:10px; 
    }

    input, textarea, select { 
      width: 100%; 
      margin: 6px 0 10px; 
      padding: 10px; 
      border-radius:6px; 
      border:1px solid #ccc; 
      font-family: inherit; 
    }

    textarea { 
      resize: vertical; 
      min-height: 60px; 
    }

    button { 
      padding: 10px 20px; 
      margin:10px 10px 0 0; 
      cursor: pointer; 
      border:none; 
      border-radius:6px; 
      font-weight:600; 
    }

    .generate { 
      background:#4CAF50; 
      color:white; 
    }

    .download { 
      background:#2196F3; 
      color:white; 
    }
    iframe { 
      width:100%; 
      height:450px; 
      margin-top:20px; 
      border:1px solid #ccc; 
      border-radius:8px; 
    }

  </style>
</head>
<body>

<div class="container">
  <h2>🚀 Developer Portfolio Builder</h2>

  <!-- Basic Info -->
  <label for="name">Name</label>
  <input id="name" placeholder="Your Name">

  <label for="role">Role / Title</label>
  <input id="role" placeholder="e.g. Computer Engineering Student | Web Developer">

  <label for="photoUrl">Profile Photo URL</label>
  <input id="photoUrl">

  <label for="about">About You</label>
  <textarea id="about" placeholder="Short introduction about yourself"></textarea>

  <!-- Contact -->
  <label for="email">Email</label>
  <input id="email">

  <label for="phone">Phone</label>
  <input id="phone">

  <label for="location">Location</label>
  <input id="location" placeholder="City, State">

  <!-- Education -->
  <label for="degree">Degree</label>
  <input id="degree" placeholder="B.E. in Computer Engineering">

  <label for="college">College</label>
  <input id="college" >

  <label for="duration">Duration / Year</label>
  <input id="duration">

  <label for="cgpa">CGPA / Percentage</label>
  <input id="cgpa">

  <!-- Skills & Projects -->
  <label for="skills">Skills (comma separated)</label>
  <input id="skills" placeholder="HTML, CSS, JavaScript, React, Node.js">

  <label for="projects">Projects (one per line)</label>
  <textarea id="projects" placeholder="Project 1 - Short description
Project 2 - Short description"></textarea>

  <!-- Achievements -->
  <label for="achievements">Achievements (one per line)</label>
  <textarea id="achievements" placeholder="Hackathon participation, Certifications, etc."></textarea>

  <!-- Theme selection -->
  <label for="theme">Theme</label>
  <select id="theme">
    <option value="dark">Dark (Default)</option>
    <option value="light">Light</option>
    <option value="blue">Blue</option>
  </select>

  <button class="generate" onclick="generatePortfolio()">Generate Portfolio</button>
  <button class="download" onclick="downloadHTML()">Download HTML</button>

  <iframe id="preview"></iframe>
</div>

<script>
let generatedHTML = "";

function generatePortfolio() {
  const name         = document.getElementById('name').value;
  const role         = document.getElementById('role').value;
  const photoUrl     = document.getElementById('photoUrl').value;
  const about        = document.getElementById('about').value;
  const email        = document.getElementById('email').value;
  const phone        = document.getElementById('phone').value;
  const location     = document.getElementById('location').value;
  const degree       = document.getElementById('degree').value;
  const college      = document.getElementById('college').value;
  const duration     = document.getElementById('duration').value;
  const cgpa         = document.getElementById('cgpa').value;
  const skills       = document.getElementById('skills').value.split(',');
  const projectsRaw  = document.getElementById('projects').value.split('\n');
  const achievementsRaw = document.getElementById('achievements').value.split('\n');
  const theme        = document.getElementById('theme').value;

  const projects = projectsRaw.filter(p => p.trim() !== '');
  const achievements = achievementsRaw.filter(a => a.trim() !== '');

  // Theme-specific styles
  let bodyBg, cardBg, textColor, accentColor, borderColor;
  if (theme === 'light') {
    bodyBg = '#f3f4f6';
    cardBg = '#ffffff';
    textColor = '#111827';
    accentColor = '#2563eb';
    borderColor = '#e5e7eb';
  } else if (theme === 'blue') {
    bodyBg = '#0f172a';
    cardBg = '#020617';
    textColor = '#e5e7eb';
    accentColor = '#38bdf8';
    borderColor = '#1f2937';
  } else { // dark default
    bodyBg = '#020617';
    cardBg = '#020617';
    textColor = '#e5e7eb';
    accentColor = '#38bdf8';
    borderColor = '#1f2937';
  }

  generatedHTML = `<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>${name || 'My Portfolio'}</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family: Arial, sans-serif; background:${bodyBg}; color:${textColor}; padding:20px; }
  .wrapper { max-width:900px; margin:auto; background:${cardBg}; padding:24px 20px 32px; border-radius:16px; box-shadow:0 20px 40px rgba(0,0,0,0.3); border:1px solid ${borderColor}; }
  header { display:flex; flex-wrap:wrap; gap:20px; align-items:center; margin-bottom:20px; }
  .photo { width:120px; height:120px; border-radius:50%; background:#111; background-size:cover; background-position:center; border:3px solid ${accentColor}; }
  .head-text h1 { font-size:2.1rem; margin-bottom:4px; color:${accentColor}; }
  .head-text h2 { font-size:1rem; color:${textColor}; opacity:0.85; margin-bottom:6px; }
  .head-text p { font-size:0.9rem; color:${textColor}; max-width:500px; }
  .contact { margin-top:8px; font-size:0.85rem; opacity:0.9; }
  .contact span { margin-right:10px; }

  section { margin-top:18px; padding-top:10px; border-top:1px solid ${borderColor}; }
  section h3 { font-size:1rem; margin-bottom:8px; color:${accentColor}; text-transform:uppercase; letter-spacing:0.08em; }

  .edu p { font-size:0.9rem; margin-bottom:3px; }
  .edu .degree { font-weight:bold; }
  .edu .meta { opacity:0.85; font-size:0.85rem; }

  ul { list-style:disc; margin-left:18px; font-size:0.9rem; line-height:1.6; }
  .skills-list { display:flex; flex-wrap:wrap; gap:6px; list-style:none; margin-left:0; }
  .skills-list li { background:${bodyBg}; border:1px solid ${borderColor}; padding:4px 10px; border-radius:999px; font-size:0.85rem; }

  @media (max-width:700px) {
    header { flex-direction:column; align-items:flex-start; }
  }
</style>
</head>
<body>
<div class="wrapper">
  <header>
    <div class="photo" style="background-image:url('${photoUrl || ''}');"></div>
    <div class="head-text">
      <h1>${name || 'Your Name'}</h1>
      <h2>${role || ''}</h2>
      <p>${about || ''}</p>
      <div class="contact">
        ${location ? `<span>📍 ${location}</span>` : ''}
        ${email ? `<span>📧 ${email}</span>` : ''}
        ${phone ? `<span>📱 ${phone}</span>` : ''}
      </div>
    </div>
  </header>

  <section class="edu">
    <h3>Education</h3>
    ${degree || college || duration || cgpa ? `
    <p class="degree">${degree || ''}</p>
    <p class="meta">${college || ''}</p>
    <p class="meta">${duration || ''}</p>
    <p class="meta">${cgpa ? 'CGPA: ' + cgpa : ''}</p>` : '<p>No education details provided.</p>'}
  </section>

  <section>
    <h3>Skills</h3>
    ${skills.filter(s => s.trim() !== '').length ? `
    <ul class="skills-list">
      ${skills.filter(s => s.trim() !== '').map(s => `<li>${s.trim()}</li>`).join('')}
    </ul>` : '<p>No skills added.</p>'}
  </section>

  <section>
    <h3>Projects</h3>
    ${projects.length ? `
    <ul>
      ${projects.map(p => `<li>${p}</li>`).join('')}
    </ul>` : '<p>No projects added.</p>'}
  </section>

  <section>
    <h3>Achievements</h3>
    ${achievements.length ? `
    <ul>
      ${achievements.map(a => `<li>${a}</li>`).join('')}
    </ul>` : '<p>No achievements added.</p>'}
  </section>
</div>
</body>
</html>`;

  const iframe = document.getElementById('preview');
  iframe.srcdoc = generatedHTML;
}

function downloadHTML() {
  if (!generatedHTML) {
    alert("Please generate the portfolio first!");
    return;
  }
  const blob = new Blob([generatedHTML], { type: 'text/html' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'portfolio.html';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}
</script>

</body>
</html>
